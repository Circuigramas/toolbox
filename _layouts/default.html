<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>
    {%- if page.title and page.title != site.title -%}
      {{ page.title }} — {{ site.title }}
    {%- else -%}
      {{ site.title }}
    {%- endif -%}
  </title>
  <meta name="description" content="{{ page.summary | default: site.description | escape }}" />
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}" />
  {% seo %}
</head>
<body>

<header>
  <a href="{{ '/' | relative_url }}" class="site-title">
    <img src="{{ '/assets/img/logo_circuigramas_transparent.png' | relative_url }}" alt="{{ site.title }}" class="site-logo" />
  </a>
  <p>{{ site.description }}</p>
</header>

<main>
  {{ content }}
</main>

<footer>
  <a href="{{ '/' | relative_url }}">← Volver al toolbox</a>
</footer>

</body>
</html>
